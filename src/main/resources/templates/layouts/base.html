<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Plateforme de Suivi des Stagiaires'">Plateforme de Suivi des Stagiaires</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    
    <!-- Custom styles for specific pages -->
    <th:block th:fragment="custom-styles"></th:block>
</head>
<body>
    <!-- Header -->
    <header class="header" th:fragment="header">
        <div class="header-content">
            <div class="logo">
                <img th:src="@{/images/ocp-logo.png}" alt="Logo OCP">
                <h1>Plateforme de Suivi des Stagiaires</h1>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li><a th:href="@{/}"><i class="bi bi-house-door"></i> Accueil</a></li>
                    <li><a th:href="@{/stagiaire}"><i class="bi bi-person"></i> Stagiaire</a></li>
                    <li><a th:href="@{/encadrant}"><i class="bi bi-person-badge"></i> Encadrant</a></li>
                    <li><a th:href="@{/cci}"><i class="bi bi-building"></i> CCI</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <th:block layout:fragment="content">
            <!-- Content will be inserted here -->
        </th:block>
    </main>

    <!-- Footer -->
    <footer class="footer" th:fragment="footer">
        <div class="footer-content">
            <p><i class="bi bi-geo-alt"></i> OCP Site Industriel Benguérir, Maroc</p>
            <p>
                <i class="bi bi-envelope"></i> contact@ocp-stages.ma | 
                <i class="bi bi-telephone"></i> +212 5 24 00 00 00
            </p>
            <p><em>Projet fictif réalisé à des fins pédagogiques</em></p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript -->
    <th:block th:fragment="custom-scripts"></th:block>
</body>
</html>
