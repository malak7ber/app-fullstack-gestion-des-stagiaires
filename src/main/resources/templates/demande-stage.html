<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande de Stage - OCP</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <div th:replace="~{fragments/header-footer :: header}"></div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="card" style="max-width: 800px; margin: 0 auto;">
            <div class="card-header text-center">
                <h2 class="card-title mb-0">
                    <i class="bi bi-file-earmark-plus text-primary"></i> Formulaire de Demande de Stage
                </h2>
                <p class="text-muted mt-2 mb-0">Remplissez tous les champs pour soumettre votre demande</p>
            </div>
            
            <div class="card-body">
                <form th:action="@{/stagiaire/demande-stage}" th:object="${stagiaire}" method="post">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="nom" class="form-label">
                                    <i class="bi bi-person"></i> Nom *
                                </label>
                                <input type="text" id="nom" th:field="*{nom}" class="form-control" required />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="prenom" class="form-label">
                                    <i class="bi bi-person"></i> Prénom *
                                </label>
                                <input type="text" id="prenom" th:field="*{prenom}" class="form-control" required />
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="email" class="form-label">
                                    <i class="bi bi-envelope"></i> Email *
                                </label>
                                <input type="email" id="email" th:field="*{email}" class="form-control" required />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="telephone" class="form-label">
                                    <i class="bi bi-telephone"></i> Téléphone *
                                </label>
                                <input type="text" id="telephone" th:field="*{telephone}" class="form-control" required />
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="ecole" class="form-label">
                                    <i class="bi bi-building"></i> École *
                                </label>
                                <input type="text" id="ecole" th:field="*{ecole}" class="form-control" required />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="specialite" class="form-label">
                                    <i class="bi bi-book"></i> Spécialité *
                                </label>
                                <input type="text" id="specialite" th:field="*{specialite}" class="form-control" required />
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="dateDebut" class="form-label">
                                    <i class="bi bi-calendar-event"></i> Date de début *
                                </label>
                                <input type="date" id="dateDebut" th:field="*{dateDebut}" class="form-control" required />
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="dateFin" class="form-label">
                                    <i class="bi bi-calendar-check"></i> Date de fin *
                                </label>
                                <input type="date" id="dateFin" th:field="*{dateFin}" class="form-control" required />
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="motDePasse" class="form-label">
                            <i class="bi bi-lock"></i> Mot de passe *
                        </label>
                        <input type="password" id="motDePasse" th:field="*{motDePasse}" class="form-control" required />
                        <small class="form-text text-muted">Ce mot de passe vous permettra de vous connecter à votre compte</small>
                    </div>

                    <div class="form-group">
                        <label for="motivation" class="form-label">
                            <i class="bi bi-file-text"></i> Lettre de motivation
                        </label>
                        <textarea id="motivation" th:field="*{motivation}" class="form-control" rows="5" 
                                  placeholder="Décrivez votre motivation pour ce stage..."></textarea>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-send"></i> Envoyer la demande
                        </button>
                        <a th:href="@{/stagiaire}" class="btn btn-outline">
                            <i class="bi bi-arrow-left"></i> Retour
                        </a>
                    </div>
        </form>
    </div>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/header-footer :: footer}"></div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
