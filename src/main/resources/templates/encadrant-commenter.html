<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Commenter - Encadrant</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/header-footer :: header}"></div>

    <div class="container my-5">
        <div class="card mb-4">
            <div class="card-header">
                <h2 class="mb-0">
                    <i class="bi bi-chat-left-text text-success"></i> Commenter un projet
                </h2>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <div th:if="${stagiaires == null or stagiaires.isEmpty()}" class="alert alert-info">
            <i class="bi bi-info-circle"></i> Vous n'avez pas encore de stagiaires affectes
        </div>

        <div th:if="${stagiaires != null and !stagiaires.isEmpty()}">
            <div class="card">
                <div class="card-body">
                    <form th:action="@{/encadrant/commenter}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Selectionner un stagiaire</label>
                            <select name="stagiaireId" class="form-control" required>
                                <option value="">Choisir un stagiaire...</option>
                                <option th:each="s : ${stagiaires}" 
                                        th:value="${s.id}" 
                                        th:text="${s.prenom + ' ' + s.nom + ' - ' + s.ecole}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Votre commentaire</label>
                            <textarea name="contenu" 
                                      class="form-control" 
                                      rows="5" 
                                      placeholder="Ajoutez vos remarques et conseils..."
                                      required></textarea>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-send"></i> Envoyer le commentaire
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/encadrant/dashboard}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Retour au dashboard
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/header-footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
