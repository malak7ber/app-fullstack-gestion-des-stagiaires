<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion CCI - OCP</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="card" style="max-width: 450px; width: 100%; margin: 2rem;">
        <div class="card-header text-center bg-warning">
            <h2 class="mb-0">
                <i class="bi bi-shield-lock"></i> Connexion CCI
            </h2>
            <p class="text-muted mt-2 mb-0">Espace reserve aux administrateurs</p>
        </div>
        
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/cci/login}" method="post">
                <div class="form-group mb-3">
                    <label for="email" class="form-label">
                        <i class="bi bi-envelope"></i> Email
                    </label>
                    <input type="email" 
                           id="email" 
                           name="email" 
                           class="form-control" 
                           placeholder="admin@ocp.ma" 
                           required>
                </div>

                <div class="form-group mb-3">
                    <label for="motDePasse" class="form-label">
                        <i class="bi bi-lock"></i> Mot de passe
                    </label>
                    <input type="password" 
                           id="motDePasse" 
                           name="motDePasse" 
                           class="form-control" 
                           placeholder="Votre mot de passe" 
                           required>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-warning btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Se connecter
                    </button>
                    <a th:href="@{/}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Retour
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
