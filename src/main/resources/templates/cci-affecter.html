<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affecter un Encadrant - CCI</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <div th:replace="~{fragments/header-footer :: header}"></div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="card" style="max-width: 700px; margin: 0 auto;">
            <div class="card-header text-center">
                <h2 class="card-title mb-0">
                    <i class="bi bi-people-fill text-primary"></i> Affecter un Encadrant à un Stagiaire
                </h2>
            </div>
            
            <div class="card-body">
                <form th:action="@{/cci/affecter}" method="post">
                    <div class="form-group">
                        <label for="stagiaire" class="form-label">
                            <i class="bi bi-person"></i> Sélectionnez un stagiaire
                        </label>
                        <select id="stagiaire" name="stagiaireId" class="form-control" required>
                            <option value="" disabled selected>Choisir un stagiaire...</option>
                            <option th:each="s : ${stagiaires}" 
                                    th:value="${s.id}" 
                                    th:text="${s.nom + ' - ' + s.ecole}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="encadrant" class="form-label">
                            <i class="bi bi-person-badge"></i> Sélectionnez un encadrant
                        </label>
                        <select id="encadrant" name="encadrantId" class="form-control" required>
                            <option value="" disabled selected>Choisir un encadrant...</option>
                            <option th:each="e : ${encadrants}" 
                                    th:value="${e.id}" 
                                    th:text="${e.nom + ' - ' + e.specialite}">
                            </option>
                        </select>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-circle"></i> Affecter
                        </button>
                        <a th:href="@{/cci}" class="btn btn-outline">
                            <i class="bi bi-arrow-left"></i> Retour au dashboard
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/header-footer :: footer}"></div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
