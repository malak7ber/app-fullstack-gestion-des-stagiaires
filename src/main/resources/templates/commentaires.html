<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes Commentaires - Stagiaire</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/header-footer :: header}"></div>

    <div class="container my-5">
        <div class="card mb-4 bg-success text-white">
            <div class="card-body text-center">
                <h2 class="mb-0">
                    <i class="bi bi-chat-left-text"></i> Mes Commentaires
                </h2>
                <p class="mb-0">Retours de votre encadrant</p>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div th:if="${commentaires == null or commentaires.isEmpty()}" class="text-center py-5">
                    <i class="bi bi-chat-dots" style="font-size: 4rem; color: #ccc;"></i>
                    <p class="text-muted mt-3 mb-0">Aucun commentaire pour le moment</p>
                    <p class="text-muted">Votre encadrant n'a pas encore ajoute de commentaires</p>
                </div>

                <div th:if="${commentaires != null and !commentaires.isEmpty()}">
                    <div th:each="c : ${commentaires}" class="card mb-3">
                        <div class="card-header bg-light">
                            <div class="d-flex justify-content-between">
                                <strong>
                                    <i class="bi bi-person-badge"></i>
                                    <span th:text="${c.encadrant != null ? c.encadrant.nom : 'Encadrant'}"></span>
                                </strong>
                                <span class="text-muted">
                                    <i class="bi bi-calendar"></i>
                                    <span th:text="${c.date != null ? #temporals.format(c.date, 'dd/MM/yyyy') : 'N/A'}"></span>
                                </span>
                            </div>
                        </div>
                        <div class="card-body">
                            <p th:text="${c.contenu}" class="mb-0"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/stagiaire/dashboard}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Retour au dashboard
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/header-footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
