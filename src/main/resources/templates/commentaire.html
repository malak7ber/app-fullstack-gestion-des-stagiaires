<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes Commentaires - Stagiaire</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/header-footer :: header}"></div>

    <div class="container my-5">
        <div class="card mb-4 bg-success text-white">
            <div class="card-body text-center">
                <h2 class="mb-0">
                    <i class="bi bi-chat-left-text"></i> Mes Commentaires
                </h2>
                <p class="mb-0">Echanges avec votre encadrant</p>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <div class="card">
            <div class="card-body">
                <div th:if="${commentaires == null or commentaires.isEmpty()}" class="text-center py-5">
                    <i class="bi bi-chat-dots" style="font-size: 4rem; color: #ccc;"></i>
                    <p class="text-muted mt-3 mb-0">Aucun commentaire pour le moment</p>
                </div>

                <div th:if="${commentaires != null and !commentaires.isEmpty()}">
                    <div th:each="c : ${commentaires}" class="card mb-3 border-primary">
                        <!-- Commentaire de l'encadrant -->
                        <div class="card-header bg-primary text-white">
                            <div class="d-flex justify-content-between">
                                <strong>
                                    <i class="bi bi-person-badge"></i>
                                    <span th:text="${c.encadrant != null ? c.encadrant.nom : 'Encadrant'}"></span>
                                </strong>
                                <span>
                                    <i class="bi bi-calendar"></i>
                                    <span th:text="${c.date != null ? #temporals.format(c.date, 'dd/MM/yyyy') : 'N/A'}"></span>
                                </span>
                            </div>
                        </div>
                        <div class="card-body">
                            <p th:text="${c.contenu}" class="mb-3"></p>
                            
                            <!-- Reponse du stagiaire si existe -->
                            <div th:if="${c.reponse != null and !c.reponse.isEmpty()}" 
                                 class="alert alert-light border-start border-success border-3 ms-4">
                                <p class="mb-1"><strong><i class="bi bi-reply"></i> Votre reponse :</strong></p>
                                <p th:text="${c.reponse}" class="mb-0"></p>
                                <small class="text-muted" th:if="${c.dateReponse != null}">
                                    Le <span th:text="${#temporals.format(c.dateReponse, 'dd/MM/yyyy')}"></span>
                                </small>
                            </div>

                            <!-- Formulaire de reponse -->
                            <div th:if="${c.reponse == null or c.reponse.isEmpty()}" class="mt-3 ms-4">
                                <form th:action="@{/stagiaire/repondre-commentaire}" method="post">
                                    <input type="hidden" name="commentaireId" th:value="${c.id}">
                                    <div class="input-group">
                                        <input type="text" 
                                               name="reponse" 
                                               class="form-control" 
                                               placeholder="Tapez votre reponse..."
                                               required>
                                        <button type="submit" class="btn btn-success">
                                            <i class="bi bi-reply"></i> Repondre
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/stagiaire/dashboard}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Retour
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/header-footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
