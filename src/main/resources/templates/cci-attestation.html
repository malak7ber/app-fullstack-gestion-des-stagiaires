<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Génération Attestations - CCI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/header-footer :: header}"></div>

    <div class="container my-5">
        <div class="card mb-4">
            <div class="card-header text-center">
                <h2 class="mb-0">
                    <i class="bi bi-file-earmark-pdf text-danger"></i> Génération d'Attestations
                </h2>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="mb-0">
                    <i class="bi bi-people text-primary"></i> Stagiaires éligibles
                </h3>
            </div>
            <div class="card-body">
                <div id="loading" class="text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Chargement...</span>
                    </div>
                </div>

                <div id="tableContainer" style="display:none;">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Nom</th>
                                    <th>Prénom</th>
                                    <th>École</th>
                                    <th>Période</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="stagiaireTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/cci}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Retour au dashboard
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/header-footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        fetch('/api/stagiaires')
            .then(response => response.json())
            .then(stagiaires => {
                const tbody = document.getElementById('stagiaireTableBody');
                const loading = document.getElementById('loading');
                const table = document.getElementById('tableContainer');
                
                const valides = stagiaires.filter(s => s.valide);
                
                if (valides.length === 0) {
                    loading.innerHTML = '<div class="alert alert-info">Aucun stagiaire validé</div>';
                    return;
                }
                
                valides.forEach(s => {
                    const debut = s.dateDebut ? new Date(s.dateDebut).toLocaleDateString('fr-FR') : 'N/A';
                    const fin = s.dateFin ? new Date(s.dateFin).toLocaleDateString('fr-FR') : 'N/A';
                    
                    tbody.innerHTML += `
                        <tr>
                            <td>${s.nom}</td>
                            <td>${s.prenom}</td>
                            <td>${s.ecole}</td>
                            <td>${debut} - ${fin}</td>
                            <td>
                                <a href="/attestation/preview/${s.id}" 
                                   class="btn btn-sm btn-info" 
                                   target="_blank">
                                    <i class="bi bi-eye"></i> Voir
                                </a>
                                <a href="/attestation/generer/${s.id}" 
                                   class="btn btn-sm btn-danger">
                                    <i class="bi bi-download"></i> Télécharger
                                </a>
                            </td>
                        </tr>
                    `;
                });
                
                loading.style.display = 'none';
                table.style.display = 'block';
            })
            .catch(error => {
                document.getElementById('loading').innerHTML = 
                    '<div class="alert alert-danger">Erreur de chargement</div>';
            });
    </script>
</body>
</html>
