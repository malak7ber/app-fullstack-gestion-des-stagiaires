<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Encadrants - CCI</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <div th:replace="~{fragments/header-footer :: header}"></div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h2 class="card-title mb-0">
                    <i class="bi bi-person-badge text-primary"></i> Liste des Encadrants
                </h2>
                <a th:href="@{/cci}" class="btn btn-outline">
                    <i class="bi bi-arrow-left"></i> Retour
                </a>
            </div>
            
            <div class="card-body">
                <div th:if="${encadrants == null or #lists.isEmpty(encadrants)}" class="alert alert-info">
                    <i class="bi bi-info-circle"></i> Aucun encadrant enregistré pour le moment.
                </div>

                <div th:if="${encadrants != null and !#lists.isEmpty(encadrants)}">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th><i class="bi bi-hash"></i> ID</th>
                                    <th><i class="bi bi-person"></i> Nom</th>
                                    <th><i class="bi bi-book"></i> Spécialité</th>
                                    <th><i class="bi bi-envelope"></i> Email</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="encadrant : ${encadrants}">
                                    <td th:text="${encadrant.id}"></td>
                                    <td th:text="${encadrant.nom}"></td>
                                    <td th:text="${encadrant.specialite}"></td>
                                    <td th:text="${encadrant.email != null ? encadrant.email : 'N/A'}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/header-footer :: footer}"></div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
