<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notifications - CCI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/header-footer :: header}"></div>

    <div class="container my-5">
        <div class="card mb-4">
            <div class="card-header">
                <h2 class="mb-0">
                    <i class="bi bi-bell text-warning"></i> Notifications
                </h2>
                <p class="text-muted mb-0">Rapports valides en attente d'attestation</p>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <div class="card">
            <div class="card-body">
                <div id="notificationsList">
                    <div class="text-center">
                        <div class="spinner-border text-warning" role="status">
                            <span class="visually-hidden">Chargement...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/cci}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Retour
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/header-footer :: footer}"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        fetch('/api/stagiaires')
            .then(response => response.json())
            .then(stagiaires => {
                console.log('Stagiaires recus:', stagiaires); // DEBUG
                const div = document.getElementById('notificationsList');
                
                // Filtrer: valide + rapport valide + attestation non disponible
                const enAttente = stagiaires.filter(s => 
                    s.valide === true && 
                    s.rapportValide === true && 
                    s.attestationDisponible === false
                );
                
                console.log('Stagiaires en attente:', enAttente); // DEBUG
                
                if (enAttente.length === 0) {
                    div.innerHTML = `
                        <div class="alert alert-info text-center">
                            <i class="bi bi-info-circle" style="font-size: 3rem;"></i>
                            <p class="mt-3 mb-0">Aucune notification pour le moment</p>
                            <p class="text-muted">Tous les rapports sont traites</p>
                        </div>
                    `;
                    return;
                }
                
                let html = `
                    <div class="alert alert-warning mb-4">
                        <i class="bi bi-bell"></i> 
                        <strong>${enAttente.length}</strong> rapport(s) en attente d'attestation
                    </div>
                    <div class="list-group">
                `;
                
                enAttente.forEach(s => {
                    html += `
                        <div class="list-group-item">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h5 class="mb-1">
                                        <i class="bi bi-person-check text-success"></i>
                                        ${s.prenom} ${s.nom}
                                    </h5>
                                    <p class="mb-1 text-muted">
                                        <i class="bi bi-building"></i> ${s.ecole} - ${s.specialite}
                                    </p>
                                    <small class="text-success">
                                        <i class="bi bi-check-circle-fill"></i> 
                                        Rapport valide par l'encadrant
                                        ${s.encadrant ? ' (' + s.encadrant.nom + ')' : ''}
                                    </small>
                                </div>
                                <form action="/cci/generer-attestation/${s.id}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-warning">
                                        <i class="bi bi-award"></i> Rendre attestation disponible
                                    </button>
                                </form>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                div.innerHTML = html;
            })
            .catch(error => {
                console.error('Erreur:', error);
                document.getElementById('notificationsList').innerHTML = 
                    '<div class="alert alert-danger"><i class="bi bi-exclamation-triangle"></i> Erreur de chargement</div>';
            });
    </script>
</body>
</html>
