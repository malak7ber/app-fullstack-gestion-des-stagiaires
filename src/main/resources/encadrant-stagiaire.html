<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes Stagiaires - Encadrant</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/header-footer :: header}"></div>

    <div class="container my-5">
        <!-- Header avec nom encadrant -->
        <div class="card mb-4">
            <div class="card-header">
                <h2 class="mb-0">
                    <i class="bi bi-people text-primary"></i> Mes Stagiaires
                </h2>
                <p class="text-muted mb-0">Encadrant : <strong th:text="${encadrant.nom}"></strong></p>
            </div>
        </div>

        <!-- Liste des stagiaires -->
        <div class="card">
            <div class="card-body">
                <div th:if="${stagiaires == null or stagiaires.isEmpty()}" class="alert alert-info">
                    <i class="bi bi-info-circle"></i> Aucun stagiaire affecte pour le moment
                </div>

                <div th:if="${stagiaires != null and !stagiaires.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Nom</th>
                                    <th>Prenom</th>
                                    <th>Ecole</th>
                                    <th>Specialite</th>
                                    <th>Email</th>
                                    <th>Periode</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="s : ${stagiaires}">
                                    <td th:text="${s.nom}"></td>
                                    <td th:text="${s.prenom}"></td>
                                    <td th:text="${s.ecole}"></td>
                                    <td th:text="${s.specialite}"></td>
                                    <td th:text="${s.email}"></td>
                                    <td>
                                        <span th:if="${s.dateDebut != null and s.dateFin != null}">
                                            <span th:text="${#temporals.format(s.dateDebut, 'dd/MM/yyyy')}"></span>
                                            -
                                            <span th:text="${#temporals.format(s.dateFin, 'dd/MM/yyyy')}"></span>
                                        </span>
                                        <span th:if="${s.dateDebut == null or s.dateFin == null}">N/A</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/encadrant/dashboard}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Retour au dashboard
            </a>
        </div>
    </div>

    <div th:replace="~{fragments/header-footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
