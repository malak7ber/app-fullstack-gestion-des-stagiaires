name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:

      - name: Télécharger le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Donner les droits à Maven Wrapper
        run: chmod +x mvnw

      - name: Compiler le projet
        run: ./mvnw clean package -DskipTests

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construire l'image Docker
        run: docker build -t milo574/suivi-stagiaires:latest .

      - name: Envoyer l'image sur Docker Hub
        run: docker push milo574/suivi-stagiaires:latest
