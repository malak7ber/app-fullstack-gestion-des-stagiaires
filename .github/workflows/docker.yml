name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Skip Tests
        run: echo "Tests skipped for infrastructure deployment"

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t milo574/suivi-stagiaires:latest .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: milo574/suivi-stagiaires:latest
          format: table

      - name: Push Docker Image
        run: docker push milo574/suivi-stagiaires:latest
            
      - name: Deploy on Kubernetes
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            docker pull milo574/suivi-stagiaires:latest
            kubectl rollout restart deployment suivi-stagiaires
            kubectl rollout status deployment suivi-stagiaires
